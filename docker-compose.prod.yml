version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sipeldes_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=your-db-host
      - DB_USER=your-db-user
      - DB_PASSWORD=your-db-password
      - DB_NAME=your-db-name
    command: gunicorn --bind 0.0.0.0:5000 app:app

  frontend:
    build: ./frontend
    container_name: sipeldes_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend