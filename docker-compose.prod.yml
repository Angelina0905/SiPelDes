version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sipeldes_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=sipeldes-db.c9o4c8y28izt.ap-southeast-2.rds.amazonaws.com
      - DB_USER=admin
      - DB_PASSWORD=Angelina_077
      - DB_NAME=sipeldes-db
    command: gunicorn --bind 0.0.0.0:5000 app:app

  frontend:
    build: ./frontend
    container_name: sipeldes_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend