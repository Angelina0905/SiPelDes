<!DOCTYPE html>
<html>
<head>
    <title>SiPelDes - Sistem Pelayanan Desa</title>
    <style> body { font-family: Arial; padding: 20px; } .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px;} </style>
</head>
<body>
    <h1>Layanan Mandiri Desa</h1>

    <div class="card">
        <h3>1. Pengajuan Surat</h3>
        <form action="/api/surat/submit" method="POST" enctype="multipart/form-data">
            Nama: <input type="text" name="nama" required><br><br>
            Dokumen (PDF/JPG): <input type="file" name="file_dokumen" required><br><br>
            <button type="submit">Ajukan Surat</button>
        </form>
    </div>

    <div class="card">
        <h3>2. Pengaduan Masyarakat</h3>
        <form action="/api/pengaduan/submit" method="POST" enctype="multipart/form-data">
            Laporan: <textarea name="laporan" required></textarea><br><br>
            Foto Bukti: <input type="file" name="foto_bukti" required><br><br>
            <button type="submit">Kirim Laporan</button>
        </form>
    </div>

    <div class="card">
        <h3>3. Cek Status (Tracking)</h3>
        <form action="/api/tracking/cek" method="GET">
            Nomor Tiket: <input type="text" name="tiket" required><br><br>
            <button type="submit">Cek Status</button>
        </form>
    </div>
</body>
</html>
