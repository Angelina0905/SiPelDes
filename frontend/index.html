<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiPelDes - Upload Dokumen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-12">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Upload Dokumen Desa</h1>
        
        <form id="uploadForm" class="space-y-4">
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-blue-500 transition">
                <input type="file" id="fileInput" class="hidden" required>
                <label for="fileInput" class="cursor-pointer text-gray-600">
                    <span class="block text-4xl mb-2">📄</span>
                    <span class="text-blue-600 font-semibold">Klik untuk pilih file</span> atau drag & drop
                </label>
                <p id="fileName" class="mt-2 text-sm text-gray-500"></p>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition font-medium">
                Upload Sekarang
            </button>
        </form>

        <div id="progress" class="hidden mt-4 w-full bg-gray-200 rounded-full h-2.5">
            <div class="bg-blue-600 h-2.5 rounded-full" style="width: 100%"></div>
        </div>

        <hr class="my-8">

        <div>
            <h2 class="text-lg font-semibold text-gray-700 mb-4">File Berhasil Masuk:</h2>
            <ul id="fileList" class="space-y-2">
                <li class="text-sm text-gray-400 italic text-center">Belum ada file yang diupload</li>
            </ul>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadForm = document.getElementById('uploadForm');
        const fileList = document.getElementById('fileList');

        // Tampilkan nama file saat dipilih
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileNameDisplay.textContent = fileInput.files[0].name;
            }
        });

        // Handle Proses Upload
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                // Sesuaikan URL API ini dengan endpoint backend kamu
                const response = await fetch('/api/upload', { 
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    addToFileList(data.filename || file.name, data.url || '#');
                    uploadForm.reset();
                    fileNameDisplay.textContent = '';
                    alert('Berhasil upload!');
                } else {
                    alert('Gagal upload.');
                }
            } catch (err) {
                console.error(err);
                alert('Terjadi kesalahan koneksi ke server.');
            }
        });

        function addToFileList(name, url) {
            // Hapus pesan "Belum ada file" jika ini file pertama
            if (fileList.querySelector('.italic')) fileList.innerHTML = '';

            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-gray-50 p-3 rounded border border-gray-200 text-sm";
            li.innerHTML = `
                <span class="truncate text-gray-700 font-medium">${name}</span>
                <a href="${url}" target="_blank" class="text-blue-600 hover:underline">Lihat</a>
            `;
            fileList.appendChild(li);
        }
    </script>
</body>
</html>
